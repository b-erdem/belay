name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Elixir ${{ matrix.elixir }} / ${{ matrix.storage }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        elixir: ["1.15", "1.17"]
        storage: [memory, postgres]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: capstan
          POSTGRES_DB: capstan_v2_test
        ports: ["55433:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: "26"

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}

      - run: mix deps.get

      - run: mix compile --warnings-as-errors

      - run: mix test
        if: matrix.storage == 'memory'

      - run: mix test
        if: matrix.storage == 'postgres'
        env:
          CAPSTAN_PG: "1"
